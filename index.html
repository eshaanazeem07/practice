<!DOCTYPE html>
<html>
<head>
  <title>My Web Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    h1, h2 {
      color: #333;
      text-align: center;
    }
    h1 {
      font-size: 2em;
      padding-top: 50px;
    }
    h2 {
      font-size: 1.5em;
      padding-top: 20px;
      padding-bottom: 10px;
    }
    p {
      line-height: 1.5;
      padding: 0 20px;
    }
    ul {
      list-style-type: none;
      padding: 0 20px;
    }
    li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Web Page</h1>
  <h2>About Me</h2>
  <p>My name is John Doe and I am a web developer. I love coding and designing websites.</p>
  <h2>My Favorite Movies</h2>
  <ul>
    <li>The Godfather</li>
    <li>The Shawshank Redemption</li>
    <li>Pulp Fiction</li>
  </ul>
</body>
</html>
